<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#4f46e5" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- badge -->
  <rect x="80" y="86" width="300" height="44" rx="22" fill="#4f46e5" fill-opacity="0.18"/>
  <circle cx="106" cy="108" r="6" fill="#a5b4fc"/>
  <text x="124" y="116" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="2" fill="#c7d2fe">AI CODE DETECTION ENGINE</text>

  <!-- headline -->
  <text x="80" y="256" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="800" fill="#ffffff" letter-spacing="-2">Is it</text>
  <text x="278" y="256" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="800" fill="url(#brand)" letter-spacing="-2">vibe coded?</text>
  <text x="80" y="356" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="500" fill="#94a3b8">Paste any URL. Get a serious, rigorous,</text>
  <text x="80" y="404" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="500" fill="#94a3b8">definitely-not-made-up forensic verdict.</text>

  <!-- gauge -->
  <g transform="translate(960,300)">
    <circle r="120" fill="none" stroke="#1f2544" stroke-width="20"/>
    <circle r="120" fill="none" stroke="url(#brand)" stroke-width="20" stroke-linecap="round"
            stroke-dasharray="753.9" stroke-dashoffset="75.4" transform="rotate(-90)"/>
    <text y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800" fill="#ffffff">90%</text>
    <text y="46" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="3" fill="#94a3b8">AI VIBE</text>
  </g>

  <!-- footer url -->
  <text x="80" y="560" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#818cf8">isitvibecoded.iazz.fr</text>
</svg>
